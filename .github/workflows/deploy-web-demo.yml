name: Deploy Web Demo (GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - 'WebViewMockup/**'
      - 'tools/gltf-viewer/**'
      - '.github/workflows/deploy-web-demo.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          mkdir -p deploy
          cp WebViewMockup/index.html deploy/
          cp -r WebViewMockup/PackageSources deploy/
          cp WebViewMockup/.nojekyll deploy/
          find deploy -name '*.ps1' -delete
          find deploy -name '*.py' -delete
          find deploy -name 'README.txt' -delete

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
